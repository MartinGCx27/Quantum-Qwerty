{% load static %}
<section id="nos-desafios" class="desafios section">
  <h2>¡Nos encantan los desafíos!</h2>
  <p class="desafios-subtitulo">Siempre estamos en búsqueda de crear soluciones tecnológicas nuevas y originales para más industrias.</p>

  <div class="desafios-grid">
    {% for desafio in desafios %}
    <div class="desafio-item" data-src="{{ desafio.icono_url }}">
      <!-- Fallback (si WebGL falla o la imagen no permite CORS) -->
      <img class="desafio-fallback" src="{{ desafio.icono_url }}" alt="{{ desafio.titulo }}" loading="lazy">
      <!-- El canvas WebGL lo inyecta gooey.js -->
      <div class="overlay"><h3>{{ desafio.titulo }}</h3></div>
    </div>
    {% endfor %}
  </div>

  <a href="{% url 'about' %}" class="button-know-us button-challenges">
    <span>¿Quieres saber más de nuestros casos de éxito?</span>
    <div class="span-wrapper">
      <span class="s1"></span><span class="s2"></span><span class="s3"></span>
    </div>
  </a>
</section>

<!-- (Opcional) Bootstrap si lo usas en este bloque -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<!-- Tu CSS principal ya incluye el bloque al final (ver #2) -->
<link rel="stylesheet" href="{% static 'css/main.css' %}">

<!-- Librerías necesarias del efecto -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>

<!-- Tu script del efecto -->
<script src="{% static 'js/gooey.js' %}" defer></script>
